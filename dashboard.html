<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Polymarket Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: monospace; font-size: 13px; }

    header {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 20px; background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    header h1 { font-size: 14px; color: #e6edf3; letter-spacing: 1px; }

    .badge {
      padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold;
    }
    .badge.dry  { background: #1f6feb; color: #fff; }
    .badge.live { background: #da3633; color: #fff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    .header-right { margin-left: auto; display: flex; gap: 28px; }
    .stat { text-align: right; }
    .stat-label { color: #8b949e; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
    .stat-value { font-size: 14px; color: #e6edf3; }
    .green { color: #3fb950; }
    .red   { color: #f85149; }
    .muted { color: #8b949e; }

    main { padding: 14px 20px; }

    .markets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .market-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 11px 12px;
      transition: border-color .2s;
    }
    .market-card.enter { border-color: #3fb950; }

    .card-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 5px;
    }
    .card-name  { font-size: 13px; font-weight: bold; color: #e6edf3; }
    .countdown  { font-size: 12px; color: #8b949e; }
    .countdown.urgent { color: #f0883e; font-weight: bold; }

    .question {
      font-size: 10px; color: #6e7681;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .price-bar {
      display: flex; gap: 14px; font-size: 11px; margin-bottom: 6px; color: #8b949e;
    }
    .price-bar b { color: #c9d1d9; }

    .sides { width: 100%; border-collapse: collapse; margin-bottom: 6px; }
    .sides th {
      text-align: left; font-size: 10px; font-weight: normal;
      color: #8b949e; padding: 2px 4px; border-bottom: 1px solid #21262d;
    }
    .sides td { padding: 3px 4px; font-size: 12px; }
    .side-enter td { background: #0a2a0a; }
    .side-name { color: #e6edf3; font-weight: bold; width: 44px; }
    .enter-tag { color: #3fb950; font-size: 10px; }

    .card-stats {
      font-size: 10px; color: #6e7681;
      display: flex; justify-content: space-between;
    }

    .section-title { font-size: 12px; color: #8b949e; margin-bottom: 6px; letter-spacing: .5px; }

    table.trades { width: 100%; border-collapse: collapse; }
    .trades th {
      text-align: left; font-size: 10px; color: #8b949e;
      padding: 4px 8px; border-bottom: 1px solid #30363d;
    }
    .trades td { padding: 4px 8px; font-size: 11px; border-bottom: 1px solid #161b22; }
    .trades .win     { color: #3fb950; }
    .trades .lose    { color: #f85149; }
    .trades .pending { color: #8b949e; }
  </style>
</head>
<body>

<header>
  <h1>POLYMARKET BOT</h1>
  <span id="mode-badge" class="badge">...</span>
  <div class="header-right">
    <div class="stat">
      <div class="stat-label">Balance</div>
      <div class="stat-value" id="balance">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">PNL (session)</div>
      <div class="stat-value" id="pnl">—</div>
    </div>
  </div>
</header>

<main>
  <div class="markets-grid" id="markets-grid"></div>

  <div class="section-title">TRADE HISTORY</div>
  <table class="trades">
    <thead>
      <tr>
        <th>Time</th><th>Market</th><th>Side</th>
        <th>Size</th><th>Price</th><th>Result</th>
      </tr>
    </thead>
    <tbody id="trade-tbody"></tbody>
  </table>
</main>

<script>
const MARKET_ORDER = ['BTC-5M','BTC-15M','ETH-5M','ETH-15M'];

function fmtDiff(d) {
  if (d == null) return '<span class="muted">waiting</span>';
  const cls = d >= 0 ? 'green' : 'red';
  const sign = d >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${d.toFixed(2)}</span>`;
}

function renderMarket(name, m) {
  const sides = m.sides || {};
  const hasEnter = Object.values(sides).some(s => s.should_enter);
  const secs = m.secs_left ?? 0;
  const secsStr = secs > 0 ? `${Math.floor(secs)}s` : 'ended';
  const urgentCls = secs > 0 && secs <= 10 ? 'urgent' : '';

  const openStr = m.price_open != null ? m.price_open.toFixed(2) : '—';

  let sidesHtml = '';
  for (const [side, sd] of Object.entries(sides)) {
    const enterCls = sd.should_enter ? 'side-enter' : '';
    const enterTag = sd.should_enter ? ' <span class="enter-tag">▶ ENTER</span>' : '';
    const askStr   = sd.ask != null ? sd.ask : '--';
    sidesHtml += `<tr class="${enterCls}">
      <td class="side-name">${side}</td>
      <td>${askStr}${enterTag}</td>
    </tr>`;
  }

  const st = m.stats || {};
  const rv = m.rev   || {};
  const tradeStats = `P:${st.placed||0} F:${st.filled||0} ✗:${st.unfilled||0} W:${st.win||0} L:${st.lose||0}`;
  const revStats   = `Rev W:${rv.win||0} L:${rv.lose||0}`;

  return `<div class="market-card${hasEnter ? ' enter' : ''}">
  <div class="card-head">
    <span class="card-name">${name}</span>
    <span class="countdown ${urgentCls}">⏱ ${secsStr}</span>
  </div>
  <div class="question" title="${(m.question||'').replace(/"/g,'&quot;')}">${m.question||'loading...'}</div>
  <div class="price-bar">
    <span>Open <b>${openStr}</b></span>
    <span>Diff ${fmtDiff(m.diff)}</span>
  </div>
  <table class="sides">
    <thead><tr><th>Side</th><th>Ask</th></tr></thead>
    <tbody>${sidesHtml}</tbody>
  </table>
  <div class="card-stats">
    <span>${tradeStats}</span>
    <span>${revStats}</span>
  </div>
</div>`;
}

function render(state) {
  const badge = document.getElementById('mode-badge');
  if (state.dry_run) {
    badge.textContent = 'DRY RUN';
    badge.className = 'badge dry';
  } else {
    badge.textContent = 'LIVE';
    badge.className = 'badge live';
  }

  const balEl = document.getElementById('balance');
  balEl.textContent = state.balance != null ? `$${state.balance.toFixed(2)}` : '—';

  const pnlEl = document.getElementById('pnl');
  const p = state.session_pnl;
  if (p != null) {
    pnlEl.textContent = `${p >= 0 ? '+' : ''}$${p.toFixed(2)}`;
    pnlEl.className = 'stat-value ' + (p >= 0 ? 'green' : 'red');
  } else {
    pnlEl.textContent = '—';
    pnlEl.className = 'stat-value';
  }

  const markets = state.markets || {};
  const names = [
    ...MARKET_ORDER.filter(n => n in markets),
    ...Object.keys(markets).filter(n => !MARKET_ORDER.includes(n)),
  ];
  document.getElementById('markets-grid').innerHTML = names.map(n => renderMarket(n, markets[n])).join('');
}

async function pollState() {
  try {
    const r = await fetch('/api/state');
    if (r.ok) render(await r.json());
  } catch (_) {}
}

async function pollTrades() {
  try {
    const r = await fetch('/api/trades');
    if (!r.ok) return;
    const trades = await r.json();
    document.getElementById('trade-tbody').innerHTML = trades.map(t => {
      const cls = t.result === 'WIN' ? 'win' : t.result === 'LOSE' ? 'lose' : 'pending';
      return `<tr>
        <td>${t.ts||''}</td><td>${t.market||''}</td><td>${t.side||''}</td>
        <td>${t.size||''}</td><td>${t.price||''}</td>
        <td class="${cls}">${t.result||''}</td>
      </tr>`;
    }).join('');
  } catch (_) {}
}

setInterval(pollState,  500);
setInterval(pollTrades, 2000);
pollState();
pollTrades();
</script>
</body>
</html>
